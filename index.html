<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    overflow: hidden;
}

/* BOOM SCREEN */
#boomScreen {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: radial-gradient(circle, #ffcc70, #000000);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 30px;
    text-align: center;
    animation: zoomOut 3s forwards;
}

@keyframes zoomOut {
    0% {transform: scale(0); opacity: 0;}
    70% {transform: scale(1.2); opacity: 1;}
    100% {transform: scale(1); opacity: 1;}
}

/* INVITATION PAGE */
#mainContent {
    display: none;
    text-align: center;
    background: #111;
    min-height: 100vh;
    padding-top: 20px;
}

.lang-buttons {
    position: fixed;
    top: 15px;
    right: 15px;
}

.lang-buttons button {
    padding: 8px 12px;
    margin-left: 5px;
    border: none;
    cursor: pointer;
    border-radius: 5px;
    font-weight: bold;
}

img {
    width: 95%;
    max-width: 600px;
    margin-top: 60px;
    border-radius: 10px;
    box-shadow: 0 0 20px gold;
    transition: opacity 0.5s ease;
}
</style>
</head>

<body>

<div id="boomScreen">
    <div>
        💍<br>
        With Love & Blessings<br>
        We Invite You
    </div>
</div>

<div id="mainContent">
    <div class="lang-buttons">
        <button onclick="switchLang('tulu')">Tulu</button>
        <button onclick="switchLang('kannada')">Kannada</button>
    </div>

    <img id="invitationImage" src="invitation_tulu.jpg" alt="Invitation">
</div>

<script>
setTimeout(function(){
    document.getElementById("boomScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
    document.body.style.overflow = "auto";
}, 3000);

function switchLang(lang) {
    var img = document.getElementById("invitationImage");
    img.style.opacity = 0;
    setTimeout(function(){
        if(lang === "tulu"){
            img.src = "invitation_tulu.jpg";
        } else {
            img.src = "invitation_kannada.jpg";
        }
        img.style.opacity = 1;
    }, 300);
}
</script>

</body>
</html>
